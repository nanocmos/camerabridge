<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Biochar Camera Bridge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
    /* สไตล์สำหรับหน้าจอโหลดข้อมูล */
    #loading-overlay {
        display: none; /* ซ่อนไว้เริ่มต้น */
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        z-index: 9999;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
</style>
    
</head>
<body class="bg-dark text-white text-center">
    <div id="loading-overlay">
    <div class="spinner-border text-danger" role="status" style="width: 3rem; height: 3rem;">
        <span class="visually-hidden">Loading...</span>
    </div>
    <h5 class="mt-3 text-white" id="loading-text">กำลังบันทึกข้อมูล...</h5>
</div>
    <div class="container py-5">
        <div id="main-ui">
            <h4>ถ่ายรูปสำหรับเตา: <span id="displaySheet" class="text-warning">กำลังโหลด...</span></h4>
            <video id="video" autoplay playsinline class="w-100 rounded mb-3" style="max-width: 500px; background: #000;"></video>
            <canvas id="canvas" style="display:none;"></canvas>
            
            <div class="d-grid gap-2 col-8 mx-auto">
                <button id="captureBtn" class="btn btn-danger btn-lg rounded-pill">ถ่ายรูปและบันทึก</button>
                <button onclick="window.close()" class="btn btn-outline-light">กลับหน้าหลัก</button>
            </div>
        </div>
        <p id="status" class="mt-3 text-secondary small"></p>
    </div>

    <script>
        let GAS_URL = "";
        let sheetName = "";
        let dateStr = "";

        function isLineApp() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            return (ua.indexOf("Line") > -1);
        }

        async function initCamera() {
            const statusElem = document.getElementById('status');
            try {
                const constraints = {
                    video: { facingMode: { ideal: "environment" } },
                    audio: false
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                const video = document.getElementById('video');
                if (video) video.srcObject = stream;
                statusElem.innerText = "📷 กล้องพร้อมใช้งาน (กล้องหลัง)";
            } catch (err) {
                console.error(err);
                statusElem.innerText = "❌ ไม่สามารถเปิดกล้องได้: " + err.message;
                Swal.fire('กล้องมีปัญหา', 'กรุณาตรวจสอบการอนุญาตเข้าถึงกล้อง', 'error');
            }
        }

        window.onload = function() {
            // 1. ตรวจสอบ LINE App
            if (isLineApp()) {
                document.getElementById('main-ui').style.display = 'none';
                document.getElementById('status').innerHTML = "⚠️ โปรดเปิดใน Chrome หรือ Safari";
                
                Swal.fire({
                    icon: 'warning',
                    title: 'กรุณาเปิดด้วยเบราว์เซอร์ปกติ',
                    html: `เบราว์เซอร์ของ LINE ไม่รองรับการใช้งานกล้องในระบบนี้<br><br>
                           <b>วิธีแก้ไข:</b><br>
                           1. กดปุ่ม <b>"จุดสามจุด" (⋮ หรือ ⋯)</b><br>
                           2. เลือก <b>"เปิดด้วยเบราว์เซอร์เริ่มต้น"</b>`,
                    confirmButtonText: 'ตกลง',
                    confirmButtonColor: '#d33',
                    allowOutsideClick: false
                });
                return;
            }

            // 2. ดึงค่า Parameters
            const urlParams = new URLSearchParams(window.location.search);
            sheetName = urlParams.get('sheet') || 'ไม่ระบุชื่อเตา';
            dateStr = urlParams.get('date') || '';
            GAS_URL = urlParams.get('gas_url');

            document.getElementById('displaySheet').innerText = sheetName;

            // 3. เริ่มกล้อง
            initCamera();

            // 4. การจัดการปุ่มถ่ายรูป
            const captureBtn = document.getElementById('captureBtn');
            captureBtn.onclick = async function() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusElem = document.getElementById('status');
    const loadingOverlay = document.getElementById('loading-overlay'); // ตัวแปรใหม่

    if (!video.videoWidth || !GAS_URL) {
        Swal.fire('ผิดพลาด', 'กล้องยังไม่พร้อม หรือข้อมูล URL ไม่ถูกต้อง', 'error');
        return;
    }

    // --- 1. เริ่มแสดงวงล้อโหลด ---
    captureBtn.disabled = true;
    loadingOverlay.style.display = 'flex'; 
    statusElem.innerText = "⏳ กำลังประมวลผลภาพ...";

    // ส่วนการ Resize ภาพเดิม
    const maxWidth = 1000;
    const scale = maxWidth / video.videoWidth;
    canvas.width = maxWidth;
    canvas.height = video.videoHeight * scale;
    
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];

    statusElem.innerText = "⏳ กำลังบันทึกลง Google Drive...";

    try {
        await fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                image: imageData,
                sheetName: sheetName,
                dateStr: dateStr
            })
        });

        statusElem.innerText = "✅ บันทึกสำเร็จ!";
        // --- 2. ซ่อนวงล้อโหลดเมื่อสำเร็จ ---
        loadingOverlay.style.display = 'none'; 

        Swal.fire({ 
            icon: 'success', 
            title: 'บันทึกรูปภาพเรียบร้อย', 
            timer: 2000,
            showConfirmButton: false 
        });

    } catch (e) {
        // --- 3. ซ่อนวงล้อโหลดเมื่อเกิดข้อผิดพลาด ---
        loadingOverlay.style.display = 'none'; 
        statusElem.innerText = "❌ เกิดข้อผิดพลาดในการส่งข้อมูล";
        console.error(e);
        Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อกับ Server ได้', 'error');
    } finally {
        captureBtn.disabled = false;
        loadingOverlay.style.display = 'none'; // ป้องกันการค้าง
    }
};
        };
    </script>
</body>
</html>

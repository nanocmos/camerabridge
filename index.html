<!DOCTYPE html>
<html>
<head>
    <title>Biochar Camera Bridge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white text-center">
    <div class="container py-5">
        <h4>ถ่ายรูปสำหรับเตา: <span id="displaySheet"></span></h4>
        <video id="video" autoplay playsinline class="w-100 rounded mb-3" style="max-width: 500px; background: #000;"></video>
        <canvas id="canvas" style="display:none;"></canvas>
        
        <div class="d-grid gap-2 col-8 mx-auto">
            <button id="captureBtn" class="btn btn-danger btn-lg rounded-pill">ถ่ายรูปและบันทึก</button>
            <button onclick="window.close()" class="btn btn-outline-light">กลับหน้าหลัก</button>
        </div>
        <p id="status" class="mt-3"></p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sheetName = urlParams.get('sheet');
        const dateStr = urlParams.get('date');
        document.getElementById('displaySheet').innerText = sheetName;

        const GAS_URL = "YOUR_GAS_EXEC_URL"; // Paste your /exec URL here

        async function initCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('video').srcObject = stream;
        }

        document.getElementById('captureBtn').onclick = async () => {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            const imageData = canvas.toDataURL('image/jpeg').split(',')[1];
            document.getElementById('status').innerText = "กำลังบันทึก...";

            fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    image: imageData,
                    sheetName: sheetName,
                    dateStr: dateStr
                })
            }).then(() => {
                document.getElementById('status').innerText = "บันทึกสำเร็จ! คุณสามารถปิดหน้านี้ได้";
                alert("บันทึกรูปภาพเรียบร้อย");
            });
        };

        initCamera();
    </script>
</body>
</html>

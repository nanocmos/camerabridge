<script>
    // ประกาศตัวแปรไว้ด้านบนเพื่อให้ทุกฟังก์ชันเข้าถึงได้
    let GAS_URL = "";
    let sheetName = "";
    let dateStr = "";

    async function initCamera() {
        const urlParams = new URLSearchParams(window.location.search);
        sheetName = urlParams.get('sheet') || 'ไม่ระบุชื่อเตา';
        dateStr = urlParams.get('date') || '';
        GAS_URL = urlParams.get('gas_url');

        // แสดงชื่อเตาบนหน้าจอ
        const displayElem = document.getElementById('displaySheet');
        if (displayElem) displayElem.innerText = sheetName;

        try {
            const constraints = {
                video: { facingMode: { ideal: "environment" } },
                audio: false
            };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            const video = document.getElementById('video');
            if (video) video.srcObject = stream;
            
            const statusElem = document.getElementById('status');
            if (statusElem) statusElem.innerText = "กล้องพร้อมใช้งาน (กล้องหลัง)";
        } catch (err) {
            console.error(err);
            document.getElementById('status').innerText = "ไม่สามารถเปิดกล้องได้";
        }
    }

    // --- ส่วนที่แก้ไข: หุ้มด้วย window.onload ---
    window.onload = function() {
        // เริ่มต้นกล้อง
        initCamera();

        // กำหนดปุ่มคลิก (ตอนนี้ปุ่มจะถูกโหลดขึ้นมาจริงๆ แล้ว ไม่เป็น null แน่นอน)
        const btn = document.getElementById('captureBtn');
        if (btn) {
            btn.onclick = async function() {
                const video = document.getElementById('video');
                const canvas = document.getElementById('canvas');
                const statusElem = document.getElementById('status');
                
                if (!video || !GAS_URL) return;

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                const imageData = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
                if (statusElem) statusElem.innerText = "⏳ กำลังบันทึก...";

                try {
                    await fetch(GAS_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({
                            image: imageData,
                            sheetName: sheetName,
                            dateStr: dateStr
                        })
                    });
                    if (statusElem) statusElem.innerText = "✅ บันทึกสำเร็จ!";
                    alert("บันทึกรูปภาพเรียบร้อย");
                } catch (e) {
                    if (statusElem) statusElem.innerText = "❌ เกิดข้อผิดพลาด";
                }
            };
        }
    };
</script>

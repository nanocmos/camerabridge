<script>
    // ดึงค่า Parameters ทั้งหมดจาก URL
    const urlParams = new URLSearchParams(window.location.search);
    const sheetName = urlParams.get('sheet') || 'ไม่ระบุชื่อเตา';
    const dateStr = urlParams.get('date') || '';
    
    // --- ส่วนที่แก้ไข: ดึง GAS_URL จาก Parameter ---
    
const GAS_URL = urlParams.get('gas_url'); // จะได้รับค่าอัตโนมัติจาก Dashboard
    
    document.getElementById('displaySheet').innerText = sheetName;

    let stream = null;

    // ตรวจสอบว่ามี GAS_URL ส่งมาหรือไม่
    if (!GAS_URL) {
        document.getElementById('status').innerHTML = "<span class='text-danger'>ข้อผิดพลาด: ไม่พบ GAS_URL ในระบบ</span>";
        document.getElementById('captureBtn').disabled = true;
    }

    async function initCamera() {
        try {
            const constraints = {
                video: {
                    facingMode: { ideal: "environment" },
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                },
                audio: false
            };
            stream = await navigator.mediaDevices.getUserMedia(constraints);
            document.getElementById('video').srcObject = stream;
            document.getElementById('status').innerText = "กล้องพร้อมใช้งาน (กล้องหลัง)";
        } catch (err) {
            document.getElementById('status').innerText = "ไม่สามารถเข้าถึงกล้องได้";
            console.error(err);
        }
    }

    document.getElementById('captureBtn').onclick = async () => {
        if (!GAS_URL) return;

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        const imageData = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
        document.getElementById('status').innerText = "⏳ กำลังบันทึกข้อมูล...";
        document.getElementById('captureBtn').disabled = true;

        try {
            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    image: imageData,
                    sheetName: sheetName,
                    dateStr: dateStr
                })
            });

            document.getElementById('status').innerText = "✅ บันทึกสำเร็จ!";
            Swal.fire({ icon: 'success', title: 'บันทึกเรียบร้อย', timer: 2000 });
        } catch (err) {
            document.getElementById('status').innerText = "❌ เกิดข้อผิดพลาด";
            console.error(err);
        } finally {
            document.getElementById('captureBtn').disabled = false;
        }
    };

    initCamera();
</script>

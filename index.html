<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Biochar Camera Bridge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; }
        #loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .video-container {
            position: relative;
            max-width: 500px;
            margin: 0 auto;
        }
    </style>
</head>
<body class="bg-dark text-white text-center">
    <div id="loading-overlay">
        <div class="spinner-border text-danger" role="status" style="width: 3.5rem; height: 3.5rem;"></div>
        <h5 class="mt-3 text-white" id="loading-text">กำลังบันทึกข้อมูล...</h5>
        <p class="text-secondary small">กรุณาอย่าปิดหน้าต่างนี้</p>
    </div>

    <div class="container py-4">
        <div id="main-ui">
            <h4 class="mb-3">เตา: <span id="displaySheet" class="text-warning">กำลังโหลด...</span></h4>
            <div class="video-container">
                <video id="video" autoplay playsinline class="w-100 rounded shadow-lg mb-3" style="background: #000; border: 2px solid #444;"></video>
            </div>
            <canvas id="canvas" style="display:none;"></canvas>
            
            <div class="d-grid gap-3 col-10 col-md-8 mx-auto">
                <button id="captureBtn" class="btn btn-danger btn-lg rounded-pill shadow">📸 ถ่ายรูปและบันทึก</button>
                <button onclick="window.close()" class="btn btn-outline-light btn-sm">กลับหน้าหลัก</button>
            </div>
        </div>
        <p id="status" class="mt-4 text-secondary small"></p>
    </div>

    <script>
        let GAS_URL = "";
        let sheetName = "";
        let dateStr = "";

        function isLineApp() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            return (ua.indexOf("Line") > -1);
        }

        async function initCamera() {
            const statusElem = document.getElementById('status');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "environment" } },
                    audio: false
                });
                document.getElementById('video').srcObject = stream;
                statusElem.innerText = "📷 กล้องพร้อมใช้งาน";
            } catch (err) {
                statusElem.innerText = "❌ ไม่สามารถเปิดกล้องได้";
                Swal.fire('กล้องมีปัญหา', 'กรุณาอนุญาตให้เข้าถึงกล้อง', 'error');
            }
        }

        window.onload = function() {
            if (isLineApp()) {
                document.getElementById('main-ui').style.display = 'none';
                Swal.fire({
                    icon: 'warning',
                    title: 'เปิดด้วยเบราว์เซอร์ปกติ',
                    html: 'กดที่ปุ่ม <b>"..."</b> แล้วเลือก <b>"เปิดด้วยเบราว์เซอร์เริ่มต้น"</b>',
                    confirmButtonText: 'รับทราบ',
                    confirmButtonColor: '#d33',
                    allowOutsideClick: false
                });
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            sheetName = urlParams.get('sheet') || 'ไม่ระบุชื่อเตา';
            dateStr = urlParams.get('date') || '';
            GAS_URL = urlParams.get('gas_url');
            document.getElementById('displaySheet').innerText = sheetName;

            initCamera();

            document.getElementById('captureBtn').onclick = async function() {
                const video = document.getElementById('video');
                const canvas = document.getElementById('canvas');
                const overlay = document.getElementById('loading-overlay');
                const btn = this;

                if (!video.videoWidth || !GAS_URL) {
                    Swal.fire('ผิดพลาด', 'ข้อมูลไม่ครบถ้วน', 'error');
                    return;
                }

                btn.disabled = true;
                overlay.style.display = 'flex';

                const maxWidth = 1000;
                const scale = maxWidth / video.videoWidth;
                canvas.width = maxWidth;
                canvas.height = video.videoHeight * scale;
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];

                try {
                    await fetch(GAS_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: imageData, sheetName: sheetName, dateStr: dateStr })
                    });

                    overlay.style.display = 'none';
                    Swal.fire({ icon: 'success', title: 'บันทึกเรียบร้อย', timer: 1500, showConfirmButton: false })
                        .then(() => window.close());
                } catch (e) {
                    overlay.style.display = 'none';
                    btn.disabled = false;
                    Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
                }
            };
        };
    </script>
</body>
</html>

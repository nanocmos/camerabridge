<script>
    // ย้ายการดึงค่ามาไว้ในฟังก์ชันเพื่อให้ทำงานหลังจากหน้าจอโหลดเสร็จ
    async function initCamera() {
        // 1. ดึงค่าจาก URL Parameters
        const urlParams = new URLSearchParams(window.location.search);
        const sheetName = urlParams.get('sheet') || 'ไม่ระบุชื่อเตา';
        const dateStr = urlParams.get('date') || '';
        const GAS_URL_PARAM = urlParams.get('gas_url');

        // 2. ตรวจสอบ Element ก่อนใส่ค่า (ป้องกัน Error)
        const displayElem = document.getElementById('displaySheet');
        if (displayElem) {
            displayElem.innerText = sheetName;
        }

        const statusElem = document.getElementById('status');

        // 3. เริ่มการตั้งค่ากล้อง
        try {
            const constraints = {
                video: {
                    facingMode: { ideal: "environment" },
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                },
                audio: false
            };

            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            const videoElement = document.getElementById('video');
            if (videoElement) {
                videoElement.srcObject = stream;
            }
            if (statusElem) statusElem.innerText = "กล้องพร้อมใช้งาน (กล้องหลัง)";
            
        } catch (err) {
            console.error("Camera Error:", err);
            if (statusElem) statusElem.innerText = "ไม่สามารถเข้าถึงกล้องได้";
        }

        // เก็บค่า GAS_URL ไว้ใช้ในปุ่มกด
        window.currentGasUrl = GAS_URL_PARAM;
        window.currentSheet = sheetName;
        window.currentDate = dateStr;
    }

    // แก้ไขฟังก์ชันตอนกดปุ่ม
    document.getElementById('captureBtn').onclick = async () => {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        
        if (!video || !video.videoWidth) return;

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        const imageData = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
        document.getElementById('status').innerText = "⏳ กำลังบันทึก...";

        if (!window.currentGasUrl) {
            alert("ไม่พบ GAS URL");
            return;
        }

        try {
            await fetch(window.currentGasUrl, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    image: imageData,
                    sheetName: window.currentSheet,
                    dateStr: window.currentDate
                })
            });
            document.getElementById('status').innerText = "✅ บันทึกสำเร็จ!";
            alert("บันทึกรูปภาพเรียบร้อย");
        } catch (e) {
            document.getElementById('status').innerText = "❌ เกิดข้อผิดพลาด";
        }
    };

    // เรียกใช้ฟังก์ชัน
    initCamera();
</script>
